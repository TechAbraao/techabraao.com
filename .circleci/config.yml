version: 2.1

jobs:
  build:
    docker:
      - image: nginx:alpine
    steps:
      - checkout
      - run:
        name: Create a Docker Image

  docker-push:
    docker:
      - image: nginx:alpine
    steps:
      - checkout
      - setup_remote_docker
      - run:
          name: Build a Docker Image 
          command: docker build -f dockerfiles/Dockerfile -t $DOCKERHUB_USERNAME/techabraao:v1.0.0 .
      - run:
          name: DockerHub Login
          command: echo $DOCKERHUB_PASSWORD | docker login -u $DOCKERHUB_USERNAME --password-stdin
      - run:
          name: Sending to DockerHub
          command: docker push $DOCKERHUB_USERNAME/contacts:v1.0.0
workflows:
  pipeline:
    jobs:
      - build
      - docker-push